<section
  class="hero {% if page.hero_height %} {{ page.hero_height }} {% else %} is-medium {% endif %} is-bold is-dark"
>
  {% if page.image %}
    {% include cover-media.html src=page.image alt=page.title class="hero-media" %}
  {% endif %}
  <div class="hero-body">
    <div class="container">
      <h1 class="title is-2 is-family-secondary">{{ page.title }}</h1>
      <p class="subtitle is-3">{{ page.subtitle }}</p>
    </div>
  </div>
</section>
